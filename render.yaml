services:
  - type: web
    name: superpong-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install uv && uv venv && uv pip install fastapi "uvicorn[standard]" python-dotenv httpx opencv-python-headless numpy
    startCommand: .venv/bin/uvicorn agent:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
