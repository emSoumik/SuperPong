services:
  - type: web
    name: superpong-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn agent:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
