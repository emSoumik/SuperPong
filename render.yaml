services:
  - type: web
    name: superpong-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install uv && uv pip install --system --index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio && uv pip install --system --no-cache-dir .
    startCommand: uvicorn agent:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STREAM_API_KEY
        sync: false
      - key: STREAM_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
